<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JRB · Field Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050505;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
  }
</style>
</head>
<body>
<svg id="card" xmlns="http://www.w3.org/2000/svg" width="420" height="240" viewBox="0 0 420 240">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <pattern id="scanlines" x="0" y="0" width="420" height="3" patternUnits="userSpaceOnUse">
      <rect width="420" height="1" y="2" fill="rgba(255,255,255,0.012)"/>
    </pattern>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0e0d0d"/>
    </linearGradient>
    <linearGradient id="red-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c83c3c" stop-opacity="0"/>
      <stop offset="20%" stop-color="#c83c3c" stop-opacity="1"/>
      <stop offset="80%" stop-color="#c83c3c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c83c3c" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="main-clip">
      <rect x="0" y="0" width="420" height="240" rx="2"/>
    </clipPath>
  </defs>

  <g clip-path="url(#main-clip)">

    <!-- 배경 -->
    <rect width="420" height="240" fill="url(#bg-grad)"/>
    <rect width="420" height="240" fill="url(#scanlines)"/>
    <rect width="420" height="240" fill="#0a0a0a" filter="url(#noise)" opacity="0.35"/>

    <!-- 테두리 -->
    <rect x="1" y="1" width="418" height="238" fill="none" stroke="#2a2824" stroke-width="1"/>
    <rect x="3" y="3" width="414" height="234" fill="none" stroke="#161412" stroke-width="0.5"/>

    <!-- 헤더 -->
    <rect x="1" y="1" width="418" height="32" fill="#0c0b0b"/>
    <rect x="1" y="33" width="418" height="1" fill="url(#red-line)"/>

    <!-- 헤더 좌측 마킹 -->
    <rect x="12" y="10" width="3" height="13" fill="#c83c3c" filter="url(#glow-red)"/>
    <rect x="18" y="13" width="2" height="7" fill="#c83c3c" opacity="0.4"/>

    <!-- 헤더 텍스트 -->
    <text x="27" y="21" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" font-weight="700" fill="#c83c3c" letter-spacing="3" filter="url(#glow-red)">JRB</text>
    <text x="52" y="21" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#2a2824" letter-spacing="1">·</text>
    <text x="60" y="21" font-family="'JetBrains Mono','Courier New',monospace" font-size="8.5" fill="#4a4540" letter-spacing="2">FIELD STATUS REPORT</text>

    <!-- 헤더 우측 REC -->
    <circle cx="390" cy="17" r="4" fill="#1a1010" stroke="#2a1a1a" stroke-width="0.5"/>
    <circle cx="390" cy="17" r="2" fill="#c83c3c" filter="url(#glow-red)">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="397" y="20" font-family="'JetBrains Mono','Courier New',monospace" font-size="7" fill="#5a3030" letter-spacing="1">REC</text>

    <!-- 수직 구분선 -->
    <line x1="210" y1="42" x2="210" y2="205" stroke="#1e1c1a" stroke-width="1"/>
    <line x1="211" y1="42" x2="211" y2="205" stroke="#252220" stroke-width="0.5"/>

    <!-- ===== 좌측: 날짜/시간 ===== -->
    <text x="16" y="54" font-family="'JetBrains Mono','Courier New',monospace" font-size="7" fill="#3a3530" letter-spacing="2.5">DATE / TIME</text>
    <rect x="16" y="57" width="178" height="0.5" fill="#252220"/>

    <text id="txt-date" x="16" y="76" font-family="'JetBrains Mono','Courier New',monospace" font-size="20" font-weight="700" fill="#e8e4d8" letter-spacing="0.5">2026.05.04</text>
    <text id="txt-time" x="16" y="93" font-family="'JetBrains Mono','Courier New',monospace" font-size="13" fill="#6a6558" letter-spacing="2">23:47 KST</text>

    <!-- ===== 좌측: 위치 ===== -->
    <text x="16" y="116" font-family="'JetBrains Mono','Courier New',monospace" font-size="7" fill="#3a3530" letter-spacing="2.5">LOCATION</text>
    <rect x="16" y="119" width="178" height="0.5" fill="#252220"/>

    <!-- 위치 그리드 -->
    <rect x="16" y="126" width="178" height="46" fill="rgba(255,255,255,0.008)" rx="1"/>
    <line x1="16" y1="136" x2="194" y2="136" stroke="#1a1816" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="16" y1="148" x2="194" y2="148" stroke="#1a1816" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="16" y1="160" x2="194" y2="160" stroke="#1a1816" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="60" y1="126" x2="60" y2="172" stroke="#1a1816" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="105" y1="126" x2="105" y2="172" stroke="#1a1816" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="150" y1="126" x2="150" y2="172" stroke="#1a1816" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- 위치 마커 -->
    <circle id="loc-marker" cx="105" cy="149" r="4" fill="none" stroke="#c83c3c" stroke-width="0.8" opacity="0.6">
      <animate attributeName="r" values="4;7;4" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="105" cy="149" r="2" fill="none" stroke="#c83c3c" stroke-width="0.8" opacity="0.8"/>
    <circle cx="105" cy="149" r="1" fill="#c83c3c" filter="url(#glow-red)"/>
    <line x1="105" y1="126" x2="105" y2="172" stroke="#c83c3c" stroke-width="0.4" opacity="0.25"/>
    <line x1="16" y1="149" x2="194" y2="149" stroke="#c83c3c" stroke-width="0.4" opacity="0.25"/>

    <!-- 위치 텍스트 -->
    <text id="txt-location" x="16" y="188" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#e8e4d8" letter-spacing="0.5">███시 ███구</text>
    <text id="txt-coords" x="16" y="201" font-family="'JetBrains Mono','Courier New',monospace" font-size="7.5" fill="#3a3530" letter-spacing="1">COORDINATES  [REDACTED]</text>

    <!-- ===== 우측: 크리쳐 상태 ===== -->
    <text x="223" y="54" font-family="'JetBrains Mono','Courier New',monospace" font-size="7" fill="#3a3530" letter-spacing="2.5">CRYPTID STATUS</text>
    <rect x="223" y="57" width="182" height="0.5" fill="#252220"/>

    <!-- HUMAN 박스 -->
    <rect id="box-human" x="223" y="65" width="85" height="50" fill="rgba(255,255,255,0.02)" rx="1"/>
    <rect id="box-human-border" x="223" y="65" width="85" height="50" fill="none" stroke="#252220" stroke-width="0.8" rx="1"/>
    <rect id="bar-human" x="223" y="65" width="3" height="50" fill="#252220" rx="1"/>
    <text x="265" y="82" font-family="'JetBrains Mono','Courier New',monospace" font-size="8" font-weight="700" fill="#3a3530" letter-spacing="1" text-anchor="middle" id="label-human">HUMAN</text>
    <text x="265" y="96" font-family="'JetBrains Mono','Courier New',monospace" font-size="7" fill="#2a2824" letter-spacing="1" text-anchor="middle" id="status-human">DORMANT</text>
    <circle cx="265" cy="106" r="2" fill="#2a2824" id="dot-human"/>

    <!-- CRYPTID 박스 -->
    <rect id="box-cryptid" x="316" y="65" width="88" height="50" fill="rgba(255,255,255,0.02)" rx="1"/>
    <rect id="box-cryptid-border" x="316" y="65" width="88" height="50" fill="none" stroke="#252220" stroke-width="0.8" rx="1"/>
    <rect id="bar-cryptid" x="316" y="65" width="3" height="50" fill="#252220" rx="1"/>
    <text x="360" y="82" font-family="'JetBrains Mono','Courier New',monospace" font-size="8" font-weight="700" fill="#3a3530" letter-spacing="1" text-anchor="middle" id="label-cryptid">CRYPTID</text>
    <text x="360" y="96" font-family="'JetBrains Mono','Courier New',monospace" font-size="7" fill="#2a2824" letter-spacing="1" text-anchor="middle" id="status-cryptid">DORMANT</text>
    <circle cx="360" cy="106" r="2" fill="#2a2824" id="dot-cryptid"/>

    <!-- 우측: 개체 정보 -->
    <text x="223" y="134" font-family="'JetBrains Mono','Courier New',monospace" font-size="7" fill="#3a3530" letter-spacing="2.5">SUBJECT INFO</text>
    <rect x="223" y="137" width="182" height="0.5" fill="#252220"/>

    <text x="223" y="151" font-family="'JetBrains Mono','Courier New',monospace" font-size="7.5" fill="#3a3530" letter-spacing="1">ID</text>
    <text id="txt-id" x="253" y="151" font-family="'JetBrains Mono','Courier New',monospace" font-size="7.5" fill="#e8e4d8" letter-spacing="1">████████</text>

    <text x="223" y="164" font-family="'JetBrains Mono','Courier New',monospace" font-size="7.5" fill="#3a3530" letter-spacing="1">TYPE</text>
    <text id="txt-type" x="253" y="164" font-family="'JetBrains Mono','Courier New',monospace" font-size="7.5" fill="#6a6558" letter-spacing="1">UNCLASSIFIED</text>

    <text x="223" y="177" font-family="'JetBrains Mono','Courier New',monospace" font-size="7.5" fill="#3a3530" letter-spacing="1">RANK</text>
    <text id="txt-rank" x="253" y="177" font-family="'JetBrains Mono','Courier New',monospace" font-size="7.5" fill="#6a6558" letter-spacing="1">[ REDACTED ]</text>

    <!-- 경고 -->
    <rect id="warn-box" x="223" y="188" width="182" height="18" fill="rgba(200,60,60,0.04)" rx="1"/>
    <rect x="223" y="188" width="182" height="18" fill="none" stroke="rgba(200,60,60,0.12)" stroke-width="0.5" rx="1"/>
    <rect x="223" y="188" width="3" height="18" fill="#c83c3c" opacity="0.4" rx="1"/>
    <text id="txt-warn" x="232" y="200" font-family="'JetBrains Mono','Courier New',monospace" font-size="7" fill="#c83c3c" letter-spacing="1">※ MONITOR SUBJECT — DO NOT ENGAGE</text>

    <!-- 하단 바 -->
    <rect x="1" y="210" width="418" height="0.5" fill="#1e1c1a"/>
    <rect x="1" y="210" width="418" height="29" fill="#080807"/>

    <!-- 하단 좌 -->
    <text x="16" y="222" font-family="'JetBrains Mono','Courier New',monospace" font-size="6.5" fill="#252220" letter-spacing="1">JRB-CSF-REALTIME</text>
    <text x="16" y="232" font-family="'JetBrains Mono','Courier New',monospace" font-size="6.5" fill="#1a1816" letter-spacing="1">Ω ∩ Ψ  JOINT RESPONSE BUREAU</text>

    <!-- 하단 우: ONLINE 인디케이터 -->
    <circle cx="340" cy="223" r="2.5" fill="#4a7a4a" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="346" y="226" font-family="'JetBrains Mono','Courier New',monospace" font-size="6.5" fill="#3a5a3a" letter-spacing="1">ONLINE</text>

    <!-- 문서번호 -->
    <text id="txt-docno" x="395" y="232" font-family="'JetBrains Mono','Courier New',monospace" font-size="6" fill="#1e1c1a" letter-spacing="0.5" text-anchor="end">—</text>

    <!-- 코너 장식 -->
    <polyline points="1,10 1,1 10,1" fill="none" stroke="#c83c3c" stroke-width="1.2" opacity="0.5"/>
    <polyline points="419,10 419,1 410,1" fill="none" stroke="#c83c3c" stroke-width="1.2" opacity="0.5"/>
    <polyline points="1,230 1,239 10,239" fill="none" stroke="#252220" stroke-width="1.2"/>
    <polyline points="419,230 419,239 410,239" fill="none" stroke="#252220" stroke-width="1.2"/>

  </g>
</svg>

<script>
// URL 파라미터 파싱
const params = new URLSearchParams(window.location.search);

const date     = params.get('date')     || '2026.05.04';
const time     = params.get('time')     || '23:47 KST';
const location = params.get('location') || '███시 ███구';
const status   = (params.get('status') || 'human').toLowerCase();
const id       = params.get('id')       || '████████';
const type     = params.get('type')     || 'UNCLASSIFIED';
const rank     = params.get('rank')     || '[ REDACTED ]';
const warn     = params.get('warn')     || '※ MONITOR SUBJECT — DO NOT ENGAGE';
const docno    = params.get('doc')      || '—';

// 텍스트 업데이트
document.getElementById('txt-date').textContent     = date;
document.getElementById('txt-time').textContent     = time;
document.getElementById('txt-location').textContent = location;
document.getElementById('txt-id').textContent       = id;
document.getElementById('txt-type').textContent     = type;
document.getElementById('txt-rank').textContent     = rank;
document.getElementById('txt-warn').textContent     = warn;
document.getElementById('txt-docno').textContent    = docno;

// 크리쳐 상태 처리
const isCryptid = status === 'cryptid';

if (isCryptid) {
  // CRYPTID 활성
  document.getElementById('box-cryptid').setAttribute('fill', 'rgba(200,60,60,0.06)');
  document.getElementById('box-cryptid-border').setAttribute('stroke', '#c83c3c');
  document.getElementById('box-cryptid-border').setAttribute('stroke-width', '0.8');
  document.getElementById('bar-cryptid').setAttribute('fill', '#c83c3c');
  document.getElementById('label-cryptid').setAttribute('fill', '#c83c3c');
  document.getElementById('status-cryptid').setAttribute('fill', '#c83c3c');
  document.getElementById('status-cryptid').textContent = 'ACTIVE';
  document.getElementById('dot-cryptid').setAttribute('fill', '#c83c3c');

  // HUMAN 비활성
  document.getElementById('label-human').setAttribute('fill', '#2a2824');
  document.getElementById('status-human').textContent = 'DORMANT';

  // 경고 강조
  document.getElementById('warn-box').setAttribute('fill', 'rgba(200,60,60,0.1)');
  document.getElementById('txt-warn').setAttribute('fill', '#e83c3c');

} else {
  // HUMAN 활성
  document.getElementById('box-human').setAttribute('fill', 'rgba(74,122,74,0.06)');
  document.getElementById('box-human-border').setAttribute('stroke', '#4a7a4a');
  document.getElementById('bar-human').setAttribute('fill', '#4a7a4a');
  document.getElementById('label-human').setAttribute('fill', '#6a9a6a');
  document.getElementById('status-human').setAttribute('fill', '#4a7a4a');
  document.getElementById('status-human').textContent = 'ACTIVE';
  document.getElementById('dot-human').setAttribute('fill', '#4a7a4a');

  // CRYPTID 비활성
  document.getElementById('label-cryptid').setAttribute('fill', '#2a2824');
  document.getElementById('status-cryptid').textContent = 'DORMANT';
}
</script>
</body>
</html>
